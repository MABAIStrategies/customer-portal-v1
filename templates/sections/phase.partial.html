<section class="phase" id="phase-{{phaseNumber}}" data-phase="{{phaseNumber}}">
  <div class="container">
    <div class="phase-header">
      <div>
        <div class="phase-number">PHASE {{phaseNumber}}</div>
        <h2>{{title}}</h2>
        <p class="lead">{{narrative}}</p>
      </div>
      <div class="section-eyebrow">{{eyebrow}}</div>
    </div>

    <div class="feature-grid">
      {{#each items}}
      <div class="feature-card" data-item-id="{{itemId}}" data-roi="{{roiMonthly}}" data-hours="{{hoursSavedMonthly}}" data-price-one="{{priceOneTime}}" data-price-month="{{priceMonthly}}" data-fulcrum="{{isFulcrum}}">
        <div class="feature-icon">⚡</div>
        <div class="feature-content">
          <div class="feature-title">{{name}}</div>
          <p class="feature-desc">{{description}}</p>
          <div class="feature-meta">
            <span class="feature-roi">+${{roiMonthly}}/mo</span>
            <span class="feature-price">${{priceOneTime}} one-time • ${{priceMonthly}}/mo</span>
            {{#if platforms}}<span class="feature-tools">{{platforms}}</span>{{/if}}
          </div>
        </div>
      </div>
      {{/each}}
    </div>
  </div>
</section>
